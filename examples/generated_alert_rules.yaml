  - uid: sre-service-health-01-no_data-1
    title: "[Service Health] Panel 'Request Rate' \u2014 No Data"
    condition: C
    data:
    - refId: A
      queryType: ''
      relativeTimeRange:
        from: 300
        to: 0
      datasourceUid: __expr__
      model:
        type: math
        expression: ''
        datasource:
          uid: __expr__
          type: __expr__
    - refId: B
      queryType: ''
      relativeTimeRange:
        from: 300
        to: 0
      datasourceUid: ${datasource}
      model:
        expr: dashboard_panel_status{dashboard_uid="service-health-01", panel_id="1",
          probe_type="no_data"}
        refId: B
    - refId: C
      queryType: ''
      relativeTimeRange:
        from: 300
        to: 0
      datasourceUid: __expr__
      model:
        type: threshold
        expression: B
        conditions:
        - evaluator:
            params:
            - 1
            type: lt
          operator:
            type: and
          query:
            params:
            - C
          reducer:
            type: last
    noDataState: Alerting
    execErrState: Alerting
    for: 2m
    annotations:
      summary: "Panel 'Request Rate' in dashboard 'Service Health' \u2014 No Data"
      description: Panel has been returning empty results for >2 minutes. The source
        metric may have disappeared or the exporter may be down.
    labels:
      severity: warning
      dashboard_uid: service-health-01
      panel_id: '1'
      probe_type: no_data
