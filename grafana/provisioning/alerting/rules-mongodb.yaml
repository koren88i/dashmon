        type: classic_conditions
        refId: C
        expression: B
        datasource:
          uid: __expr__
          type: __expr__
        conditions:
        - type: query
          query:
            params:
            - B
          reducer:
            params: []
            type: last
          evaluator:
            params:
            - 1
            type: lt
          operator:
            type: and
