apiVersion: 1
datasources:
- name: Mock Prometheus
  type: prometheus
  uid: prometheus-main
  url: http://mock-prometheus:9090
  access: proxy
  isDefault: false
- name: MongoDB Mock Prometheus
  type: prometheus
  uid: prometheus-mongo
  url: http://mock-mongo-prometheus:9090
  access: proxy
  isDefault: false
- name: MongoDB Atlas Mock Prometheus
  type: prometheus
  uid: prometheus-mongo-atlas
  url: http://mock-mongo-atlas-prometheus:9090
  access: proxy
  isDefault: false
- name: MongoDB Live Proxy Prometheus
  type: prometheus
  uid: prometheus-mongo-live
  url: http://fault-proxy-mongo-live:9090
  access: proxy
  isDefault: false
- name: Probe Metrics
  type: prometheus
  uid: probe-metrics
  url: http://prometheus:9090
  access: proxy
  isDefault: true
